---
- name: OIDC AWS | Check existing PVE realms
  ansible.builtin.command: pveum realm list --output-format json
  register: pve_realms
  changed_when: false

- name: OIDC AWS | Check existing PVE groups
  ansible.builtin.command: pveum group list --output-format json
  register: pve_groups
  changed_when: false

- name: OIDC AWS | Create oidc-admins group
  ansible.builtin.command: >
    pveum group add oidc-admins
    --comment "OIDC admin users"
  register: group_add
  changed_when: group_add.rc == 0
  failed_when:
    - group_add.rc != 0
    - "'already exists' not in group_add.stderr"
  when: "'oidc-admins' not in (pve_groups.stdout | from_json | map(attribute='groupid') | list)"

- name: OIDC AWS | Grant oidc-admins group Administrator role
  ansible.builtin.command: >
    pveum acl modify /
    --group oidc-admins
    --role Administrator
  register: group_acl
  changed_when: group_acl.rc == 0
  failed_when:
    - group_acl.rc != 0
    - "'already exists' not in group_acl.stderr"

- name: OIDC AWS | Add Cognito OIDC realm
  ansible.builtin.command: >
    pveum realm add {{ aws_oidc_realm_name }}
    --type openid
    --issuer-url {{ aws_oidc_issuer_url }}
    --client-id {{ aws_oidc_pve_client_id }}
    --client-key {{ aws_oidc_pve_client_secret }}
    --username-claim preferred_username
    --query-userinfo 0
    --scopes "openid,profile,email"
    --autocreate 1
    --comment "AWS Cognito OIDC (fallback)"
  no_log: true
  register: aws_realm_add
  changed_when: aws_realm_add.rc == 0
  failed_when:
    - aws_realm_add.rc != 0
    - "'already exists' not in aws_realm_add.stderr"
  when: aws_oidc_realm_name not in (pve_realms.stdout | from_json | map(attribute='realm') | list)

- name: OIDC AWS | Check existing PVE users
  ansible.builtin.command: pveum user list --output-format json
  register: pve_users
  changed_when: false

- name: OIDC AWS | Add admin user to oidc-admins group
  ansible.builtin.command: >
    pveum user modify {{ proxmox_user }}@{{ aws_oidc_realm_name }}
    --group oidc-admins
  register: user_group
  changed_when: user_group.rc == 0
  failed_when:
    - user_group.rc != 0
    - "'no such user' not in user_group.stderr"
  when: (proxmox_user ~ '@' ~ aws_oidc_realm_name) in (pve_users.stdout | from_json | map(attribute='userid') | list)

- name: OIDC AWS | Notice if admin user not yet created
  ansible.builtin.debug:
    msg: >
      Admin user {{ proxmox_user }}@{{ aws_oidc_realm_name }} not found — log in once via
      Cognito to create the account, then re-run --tags oidc_aws to assign group membership.
  when: (proxmox_user ~ '@' ~ aws_oidc_realm_name) not in (pve_users.stdout | from_json | map(attribute='userid') | list)
