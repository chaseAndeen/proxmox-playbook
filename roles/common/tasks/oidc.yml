---
- name: OIDC | Check existing PVE realms
  ansible.builtin.command: pveum realm list --output-format json
  register: pve_realms
  changed_when: false

- name: OIDC | Add Teleport OIDC realm
  ansible.builtin.command: >
    pveum realm add {{ teleport_realm_name }}
    --type openid
    --issuer-url {{ teleport_issuer_url }}
    --client-id {{ teleport_client_id }}
    --client-key {{ teleport_client_secret }}
    --username-claim username
    --scopes "openid,profile,email"
    --autocreate 1
    --comment "Teleport OIDC (primary)"
  no_log: true
  register: teleport_realm_add
  changed_when: teleport_realm_add.rc == 0
  failed_when:
    - teleport_realm_add.rc != 0
    - "'already exists' not in teleport_realm_add.stderr"
  when: teleport_realm_name not in (pve_realms.stdout | from_json | map(attribute='realm') | list)

- name: OIDC | Grant admin user Administrator via Teleport realm
  ansible.builtin.command: >
    pveum acl modify /
    --user {{ proxmox_user }}@{{ teleport_realm_name }}
    --role Administrator
  register: teleport_acl
  changed_when: teleport_acl.rc == 0
  failed_when:
    - teleport_acl.rc != 0
    - "'already exists' not in teleport_acl.stderr"

- name: OIDC | Add Cognito OIDC realm
  ansible.builtin.command: >
    pveum realm add {{ aws_oidc_realm_name }}
    --type openid
    --issuer-url {{ aws_oidc_issuer_url }}
    --client-id {{ aws_oidc_pve_client_id }}
    --client-key {{ aws_oidc_pve_client_secret }}
    --username-claim preferred_username
    --query-userinfo 0
    --scopes "openid,profile,email"
    --autocreate 1
    --comment "AWS Cognito OIDC (fallback)"
  no_log: true
  register: aws_realm_add
  changed_when: aws_realm_add.rc == 0
  failed_when:
    - aws_realm_add.rc != 0
    - "'already exists' not in aws_realm_add.stderr"
  when: aws_oidc_realm_name not in (pve_realms.stdout | from_json | map(attribute='realm') | list)

- name: OIDC | Grant admin user Administrator via Cognito realm
  ansible.builtin.command: >
    pveum acl modify /
    --user {{ proxmox_user }}@{{ aws_oidc_realm_name }}
    --role Administrator
  register: aws_acl
  changed_when: aws_acl.rc == 0
  failed_when:
    - aws_acl.rc != 0
    - "'already exists' not in aws_acl.stderr"
