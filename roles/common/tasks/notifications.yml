---
- name: Notifications | Check existing SMTP endpoints
  ansible.builtin.command: pvesh get /cluster/notifications/endpoints/smtp --output-format json
  register: smtp_endpoints
  changed_when: false
  failed_when: false

- name: Notifications | Create SMTP endpoint
  ansible.builtin.command: >
    pvesh create /cluster/notifications/endpoints/smtp
    --name ses-smtp
    --server {{ smtp_server }}
    --port {{ smtp_port }}
    --mode starttls
    --from-address {{ smtp_from }}
    --mailto {{ smtp_to }}
    --username {{ smtp_user }}
    --password {{ smtp_pass }}
    --author "Proxmox VE"
  no_log: true
  register: smtp_create
  changed_when: smtp_create.rc == 0
  failed_when:
    - smtp_create.rc != 0
    - "'already exists' not in smtp_create.stderr"
  when: >
    smtp_endpoints.rc != 0 or
    'ses-smtp' not in (smtp_endpoints.stdout | default('[]'))

- name: Notifications | Check existing matchers
  ansible.builtin.command: pvesh get /cluster/notifications/matchers --output-format json
  register: notification_matchers
  changed_when: false
  failed_when: false

- name: Notifications | Disable default mail-to-root matcher
  ansible.builtin.command: >
    pvesh set /cluster/notifications/matchers/mail-to-root
    --disable 1
  register: disable_default
  changed_when: disable_default.rc == 0
  failed_when:
    - disable_default.rc != 0
    - "'not found' not in disable_default.stderr"

- name: Notifications | Create backup failure matcher
  ansible.builtin.command: >
    pvesh create /cluster/notifications/matchers
    --name backup-failures
    --target ses-smtp
    --match-field "exact:type=vzdump"
    --match-severity error,warning
    --mode all
    --comment "Backup job failures and warnings"
  register: backup_matcher
  changed_when: backup_matcher.rc == 0
  failed_when:
    - backup_matcher.rc != 0
    - "'already exists' not in backup_matcher.stderr"
  when: >
    notification_matchers.rc != 0 or
    'backup-failures' not in (notification_matchers.stdout | default('[]'))

- name: Notifications | Create system health matcher
  ansible.builtin.command: >
    pvesh create /cluster/notifications/matchers
    --name system-health
    --target ses-smtp
    --match-field "exact:type=system-mail"
    --match-severity error,warning,unknown
    --mode all
    --comment "System health events including ZFS and storage"
  register: health_matcher
  changed_when: health_matcher.rc == 0
  failed_when:
    - health_matcher.rc != 0
    - "'already exists' not in health_matcher.stderr"
  when: >
    notification_matchers.rc != 0 or
    'system-health' not in (notification_matchers.stdout | default('[]'))
