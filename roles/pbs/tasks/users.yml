---
- name: PBS | Check existing users
  ansible.builtin.command: >
    proxmox-backup-manager user list --output-format json
  register: pbs_users
  changed_when: false

- name: PBS | Create admin user
  ansible.builtin.command: >
    proxmox-backup-manager user create {{ proxmox_user }}@pam
    --comment "Admin"
  register: admin_create
  changed_when: admin_create.rc == 0
  failed_when:
    - admin_create.rc != 0
    - "'already exists' not in admin_create.stderr"
  when: "(proxmox_user + '@pam') not in pbs_users.stdout"

- name: PBS | Grant admin user full Admin ACL
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Admin
    --auth-id {{ proxmox_user }}@pam
  register: admin_acl
  changed_when: admin_acl.rc == 0

- name: PBS | Create dedicated backup user
  ansible.builtin.command: >
    proxmox-backup-manager user create {{ pbs_backup_user }}
    --password {{ pbs_backup_user_password }}
  register: user_create
  changed_when: user_create.rc == 0
  failed_when:
    - user_create.rc != 0
    - "'already exists' not in user_create.stderr"
  no_log: true
  when: pbs_backup_user not in pbs_users.stdout

- name: PBS | Grant backup user DatastoreBackup ACL
  ansible.builtin.command: >
    proxmox-backup-manager acl update /datastore/{{ pbs_datastore_name }}
    DatastoreBackup
    --auth-id {{ pbs_backup_user }}
  register: acl_backup
  changed_when: acl_backup.rc == 0

- name: PBS | Grant backup user DatastoreAudit ACL
  ansible.builtin.command: >
    proxmox-backup-manager acl update /datastore/{{ pbs_datastore_name }}
    DatastoreAudit
    --auth-id {{ pbs_backup_user }}
  register: acl_audit
  changed_when: acl_audit.rc == 0

- name: PBS | Disable root@pam login
  ansible.builtin.command: >
    proxmox-backup-manager user update root@pam --enable false
  register: root_disable
  changed_when: root_disable.rc == 0
  failed_when:
    - root_disable.rc != 0
    - "'no changes' not in root_disable.stderr"

- name: PBS | Disable admin user PAM login
  ansible.builtin.command: >
    proxmox-backup-manager user update {{ proxmox_user }}@pam --enable false
  register: admin_pam_disable
  changed_when: admin_pam_disable.rc == 0
  failed_when:
    - admin_pam_disable.rc != 0
    - "'no changes' not in admin_pam_disable.stderr"
