---
- name: PBS OIDC Teleport | Check if Teleport client_id is seeded in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/oidc/teleport/client_id"
    --profile {{ aws_profile }}
    --region {{ aws_region }}
  register: teleport_ssm_check
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false

- name: PBS OIDC Teleport | Skip (Teleport not yet deployed)
  ansible.builtin.debug:
    msg: >
      Teleport SSM parameters not found — skipping.
      Seed /infra/oidc/teleport/client_id and /infra/oidc/teleport/client_secret,
      then re-run with --tags oidc_teleport.
  when: teleport_ssm_check.rc != 0

- name: PBS OIDC Teleport | Check existing realms
  ansible.builtin.command: proxmox-backup-manager openid-realm list --output-format json
  register: pbs_realms
  changed_when: false
  when: teleport_ssm_check.rc == 0

- name: PBS OIDC Teleport | Add Teleport OIDC realm
  ansible.builtin.command: >
    proxmox-backup-manager openid-realm create {{ teleport_realm_name }}
    --issuer-url {{ teleport_issuer_url }}
    --client-id {{ teleport_client_id }}
    --client-key {{ teleport_client_secret }}
    --username-claim username
    --scopes "profile,email"
    --autocreate true
    --comment "Teleport OIDC (primary)"
  no_log: true
  register: pbs_teleport_realm
  changed_when: pbs_teleport_realm.rc == 0
  failed_when:
    - pbs_teleport_realm.rc != 0
    - "'already exists' not in pbs_teleport_realm.stderr"
  when:
    - teleport_ssm_check.rc == 0
    - teleport_realm_name not in (pbs_realms.stdout | from_json | map(attribute='realm') | list)

- name: PBS OIDC Teleport | Grant admin user Admin ACL via Teleport realm
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Admin
    --auth-id {{ proxmox_user }}@{{ teleport_realm_name }}!token
  register: pbs_teleport_acl
  changed_when: pbs_teleport_acl.rc == 0
  failed_when:
    - pbs_teleport_acl.rc != 0
    - "'no changes' not in pbs_teleport_acl.stderr"
  when: teleport_ssm_check.rc == 0
