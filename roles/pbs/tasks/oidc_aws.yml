---
- name: PBS OIDC AWS | Check existing realms
  ansible.builtin.command: proxmox-backup-manager openid-realm list --output-format json
  register: pbs_realms
  changed_when: false

- name: PBS OIDC AWS | Add Cognito OIDC realm
  ansible.builtin.command: >
    proxmox-backup-manager openid-realm create {{ aws_oidc_realm_name }}
    --issuer-url {{ aws_oidc_issuer_url }}
    --client-id {{ aws_oidc_pbs_client_id }}
    --client-key {{ aws_oidc_pbs_client_secret }}
    --username-claim preferred_username
    --query-userinfo 0
    --scopes "openid,profile,email"
    --autocreate true
    --comment "AWS Cognito OIDC (fallback)"
  no_log: true
  register: pbs_aws_realm
  changed_when: pbs_aws_realm.rc == 0
  failed_when:
    - pbs_aws_realm.rc != 0
    - "'already exists' not in pbs_aws_realm.stderr"
  when: aws_oidc_realm_name not in (pbs_realms.stdout | from_json | map(attribute='realm') | list)

- name: PBS OIDC AWS | Check existing PBS users
  ansible.builtin.command: proxmox-backup-manager user list --output-format json
  register: pbs_users
  changed_when: false

- name: PBS OIDC AWS | Grant admin user Admin ACL via Cognito realm
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Admin
    --auth-id {{ proxmox_user }}@{{ aws_oidc_realm_name }}
  register: pbs_aws_acl
  changed_when: pbs_aws_acl.rc == 0
  failed_when:
    - pbs_aws_acl.rc != 0
    - "'no changes' not in pbs_aws_acl.stderr"
  when: (proxmox_user ~ '@' ~ aws_oidc_realm_name) in (pbs_users.stdout | from_json | map(attribute='userid') | list)

- name: PBS OIDC AWS | Notice if admin user not yet created
  ansible.builtin.debug:
    msg: >
      Admin user {{ proxmox_user }}@{{ aws_oidc_realm_name }} not found — log in once via
      Cognito to create the account, then re-run --tags oidc_aws to assign permissions.
  when: (proxmox_user ~ '@' ~ aws_oidc_realm_name) not in (pbs_users.stdout | from_json | map(attribute='userid') | list)
