---
- name: PBS OIDC | Check existing realms
  ansible.builtin.command: proxmox-backup-manager openid-realm list --output-format json
  register: pbs_realms
  changed_when: false

- name: PBS OIDC | Add Teleport OIDC realm
  ansible.builtin.command: >
    proxmox-backup-manager openid-realm create {{ teleport_realm_name }}
    --issuer-url {{ teleport_issuer_url }}
    --client-id {{ teleport_client_id }}
    --client-key {{ teleport_client_secret }}
    --username-claim username
    --scopes "openid,profile,email"
    --autocreate true
    --comment "Teleport OIDC (primary)"
  no_log: true
  register: pbs_teleport_realm
  changed_when: pbs_teleport_realm.rc == 0
  failed_when:
    - pbs_teleport_realm.rc != 0
    - "'already exists' not in pbs_teleport_realm.stderr"
  when: teleport_realm_name not in (pbs_realms.stdout | from_json | map(attribute='realm') | list)

- name: PBS OIDC | Grant admin user Admin ACL via Teleport realm
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Admin
    --auth-id {{ proxmox_user }}@{{ teleport_realm_name }}!token
  register: pbs_teleport_acl
  changed_when: pbs_teleport_acl.rc == 0
  failed_when:
    - pbs_teleport_acl.rc != 0
    - "'no changes' not in pbs_teleport_acl.stderr"

- name: PBS OIDC | Add Cognito OIDC realm
  ansible.builtin.command: >
    proxmox-backup-manager openid-realm create {{ aws_oidc_realm_name }}
    --issuer-url {{ aws_oidc_issuer_url }}
    --client-id {{ aws_oidc_pbs_client_id }}
    --client-key {{ aws_oidc_pbs_client_secret }}
    --username-claim preferred_username
    --query-userinfo 0
    --scopes "openid,profile,email"
    --autocreate true
    --comment "AWS Cognito OIDC (fallback)"
  no_log: true
  register: pbs_aws_realm
  changed_when: pbs_aws_realm.rc == 0
  failed_when:
    - pbs_aws_realm.rc != 0
    - "'already exists' not in pbs_aws_realm.stderr"
  when: aws_oidc_realm_name not in (pbs_realms.stdout | from_json | map(attribute='realm') | list)

- name: PBS OIDC | Grant admin user Admin ACL via Cognito realm
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Admin
    --auth-id {{ proxmox_user }}@{{ aws_oidc_realm_name }}!token
  register: pbs_aws_acl
  changed_when: pbs_aws_acl.rc == 0
  failed_when:
    - pbs_aws_acl.rc != 0
    - "'no changes' not in pbs_aws_acl.stderr"
