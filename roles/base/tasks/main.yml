---
- name: Base | Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Base | Install base packages
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
      - curl
      - gnupg
    state: present

- name: Base | Enable unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: '0644'

- name: Base | Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Base | Deploy fail2ban jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban

- name: Base | Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Base | Deploy hardened SSH config
  ansible.builtin.template:
    src: 99-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart ssh

- name: Base | Apply SSH restart now
  ansible.builtin.meta: flush_handlers

- name: Base | Wait for SSH to come back
  ansible.builtin.wait_for:
    host: "{{ ansible_host | default(inventory_hostname) }}"
    port: "{{ proxmox_ssh_port }}"
    timeout: 30

- name: Base | Confirm Ansible can reconnect
  ansible.builtin.wait_for_connection:
    timeout: 30
